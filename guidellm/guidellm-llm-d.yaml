apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-benchmark-llm-d
  namespace: gpt-oss-20b-benchmarks
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: guidellm
          image: ghcr.io/vllm-project/guidellm:latest
          env:
            - name: GUIDELLM_TARGET
              value: "http://openshift-ai-inference-openshift-default.openshift-ingress.svc.cluster.local/gpt-oss-20b-benchmark/gpt-oss-20b/v1"
            - name: GUIDELLM_PROFILE
              value: "concurrent"
            - name: GUIDELLM_RATE
              value: "32,64"
            - name: GUIDELLM_OUTPUTS
              value: "json,csv"
            - name: GUIDELLM_MAX_SECONDS
              value: "3000"
            - name: GUIDELLM_DATA
              value: "/data/prompts.csv"
            - name: HF_HOME
              value: "/cache"
            - name: GUIDELLM_REQUEST_TYPE
              value: "completions"
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
            - name: cache
              mountPath: /cache
            - name: results
              mountPath: /results
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: benchmark-data
        - name: cache
          emptyDir: {}
        - name: results
          emptyDir: {}
