apiVersion: v1
kind: Pod
metadata:
  name: benchmark-data-loader
  namespace: gpt-oss-20b-benchmarks
spec:
  containers:
    - name: loader
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: benchmark-data
  restartPolicy: Never
